<!DOCTYPE html>
<html>
<head>
    <title>QR Attendance System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .links {
            margin-top: 20px;
        }

        .links a {
            display: inline-block;
            margin: 8px;
            text-decoration: none;
            color: white;
            background: #28a745;
            padding: 10px 15px;
            border-radius: 6px;
        }

        .links a:last-child {
            background: #6c757d;
        }

        .links a:hover {
            opacity: 0.9;
        }

        .subtitle {
            color: #666;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>QR Attendance System</h1>

        <p class="subtitle">
            Upload an IITK ID card image to mark attendance
        </p>

        <form
            action="/scan"
            method="post"
            enctype="multipart/form-data">

            <input
                type="file"
                name="card"
                accept="image/*"
                required>

            <br>

            <button type="submit">
                Scan QR
            </button>

        </form>

        <div class="links">
            <a href="/report">View Report</a>
            <a href="/export">Export CSV</a>
        </div>

    </div>

</body>
</html>
